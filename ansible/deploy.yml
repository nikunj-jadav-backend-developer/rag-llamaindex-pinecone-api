---
- name: Deploy RAG Application
  hosts: rag_servers
  become: yes

  vars_files:
    - vars.yml

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose
          - nginx
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Clone the RAG application repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: yes
      become_user: ubuntu


    - name: Stop existing Docker containers
      command: docker-compose down
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Copy .env.example to .env
      copy:
        src: ../.env.example
        dest: "{{ app_dir }}/.env"

    - name: Build and start Docker containers
      command: docker-compose up -d --build
      args:
        chdir: "{{ app_dir }}"

    - name: Create systemd service for Docker Compose
      copy:
        dest: /etc/systemd/system/rag-app.service
        content: |
          [Unit]
          Description=RAG Docker Compose Application
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/docker compose up -d
          ExecStop=/usr/bin/docker compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and restart rag-app service
      systemd:
        name: rag-app
        state: restarted
        enabled: yes

    - name: Verify running containers
      command: docker ps
      register: docker_ps_output

    - name: Show running containers
      debug:
        var: docker_ps_output.stdout_lines